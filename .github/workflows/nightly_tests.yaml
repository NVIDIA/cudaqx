name: Nightly tests

on:
  schedule:
    # Nightly run. GitHub Actions schedules use UTC.
    - cron: '30 8 * * *'
  workflow_dispatch:
  pull_request:

jobs:
  source:
    name: Build from source
    uses: ./.github/workflows/build_wheels.yaml
    with:
      build_type: Release
      cudaq_wheels: Custom
    secrets: inherit
