name: Get CUDAQ wheels
description: 'Either restore CUDAQ wheels from cache or build them'

inputs:
  repo:
    description: 'CUDAQ repository.'
    required: true
  ref:
    description: 'The branch, tag or SHA to checkout.'
    required: true
  token:
    description: 'CUDAQ repository access token.'
    default: ''
    required: false
  cache-key-suffix:
    description: 'Unique identifier to append to cache keys.'
    default: ''
    required: false
  save-build:
    description: 'Indicates whether to save the build'
    default: 'false'
    required: false
  lookup-only:
    description: 'Check if a cache entry exists without downloading the cache'
    default: 'false'
    required: false
  platform:
    description: 'Platform (amd64 or arm64)'
    default: ''
    required: true
  cuda_version:
    description: 'CUDA version to build against. (e.g, 12.6)'
    required: true
outputs:
  found-cache:
    description: 'A boolean value to indicate that a cache entry was found.'
    value: ${{ steps.check-cache.outputs.valid }}

runs:
  using: "composite"
  steps:
    # ==========================================================================
    # Try to restore from cache
    # ==========================================================================

    - name: Create CUDAQ wheel cache key
      id: cudaq-wheels-key
      env:
        # This are a list of files that when changed should require a new cudaq build
        to_hash: |
          .github/actions/get-cudaq-wheels/**
          .cudaq_version
      run: |
        hash=${{ hashFiles(format('{0}', env.to_hash)) }}
        echo "main=cudaq-wheels-${{ inputs.platform }}-cu${{ inputs.cuda_version }}-${{ inputs.ref }}-$hash" >> $GITHUB_OUTPUT
        suffix="${{ inputs.cache-key-suffix }}"
        if [[ -n "$suffix" ]]; then
          echo "suffix=-$suffix" >> $GITHUB_OUTPUT
        fi
        sudo mkdir -p /cudaq-wheels
        sudo chown "$(id -u):$(id -g)" /cudaq-wheels
      shell: bash --noprofile --norc -euo pipefail {0}

    - name: Try to restoring CUDAQ wheels from cache
      id: restore-cudaq-wheels
      uses: actions/cache/restore@v4
      with:
        fail-on-cache-miss: false
        path: /cudaq-wheels
        key: ${{ steps.cudaq-wheels-key.outputs.main }}${{ steps.cudaq-wheels-key.outputs.suffix }}
        restore-keys: ${{ steps.cudaq-wheels-key.outputs.main }}
        lookup-only: ${{ inputs.lookup-only }}

    # The restore action could find a partial match using the `restore-keys`. In such cases
    # it would still report `cache-hit` as false, but would load the cache from the partial
    # one. Thus, we need to check whether the cache is valid by other means.
    - name: Check if cache is valid
      id: check-cache
      run: |
        if [[ "${{ steps.restore-cudaq-wheels.outputs.cache-matched-key }}" == "" ]]; then
          echo "valid=false" >> $GITHUB_OUTPUT
        else
          echo "valid=true" >> $GITHUB_OUTPUT
        fi
      shell: bash --noprofile --norc -euo pipefail {0}

    # ==========================================================================
    # Build CUDAQ wheels
    # ==========================================================================

    - name: Login to GitHub CR
      if: steps.check-cache.outputs.valid == 'false' && inputs.lookup-only == 'false'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Get CUDAQ code
      if: steps.check-cache.outputs.valid == 'false' && inputs.lookup-only == 'false'
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repo }}
        ref: ${{ inputs.ref }}
        path: cudaq
        set-safe-directory: true

    - name: Patch CUDA-Q wheel builder Ninja
      if: steps.check-cache.outputs.valid == 'false' && inputs.lookup-only == 'false'
      run: |
        python3 - <<'PY'
        from pathlib import Path

        path = Path("cudaq/docker/release/cudaq.wheel.Dockerfile")
        text = path.read_text()
        needle = "FROM $base_image AS wheelbuild\n\n"
        insertion = "\n".join([
            "FROM $base_image AS wheelbuild",
            "",
            "# Temporary for CUDA-Q PR #4809 testing: the current published manylinux",
            "# devdeps image still has Ninja 1.8.2, but the CMake-4 CUDA-Q wheel build",
            "# needs a newer Ninja. Remove this once the manylinux devdeps image is rebuilt",
            "# with CUDA-Q PR #4809's docker/build/devdeps.manylinux.Dockerfile changes.",
            "ARG NINJA_VERSION=1.12.1",
            'RUN case "$(uname -m)" in \\',
            "        x86_64) ninja_zip=ninja-linux.zip ;; \\",
            "        aarch64) ninja_zip=ninja-linux-aarch64.zip ;; \\",
            '        *) echo "Unsupported architecture: $(uname -m)" && exit 1 ;; \\',
            "    esac \\",
            '    && curl -L "https://github.com/ninja-build/ninja/releases/download/v${NINJA_VERSION}/${ninja_zip}" -o /tmp/ninja.zip \\',
            "    && python3 -m zipfile -e /tmp/ninja.zip /tmp/ninja-install \\",
            "    && install -m 0755 /tmp/ninja-install/ninja /usr/local/bin/ninja \\",
            "    && install -m 0755 /tmp/ninja-install/ninja /usr/bin/ninja \\",
            "    && rm -rf /tmp/ninja.zip /tmp/ninja-install \\",
            "    && chmod +x /usr/local/bin/ninja \\",
            "    && /usr/local/bin/ninja --version \\",
            "    && /usr/bin/ninja --version",
            "",
        ])

        if needle not in text:
            raise SystemExit(f"Did not find expected Dockerfile line: {needle!r}")
        path.write_text(text.replace(needle, insertion, 1))
        PY
      shell: bash --noprofile --norc -euo pipefail {0}

    - name: Set up context for buildx
      if: steps.check-cache.outputs.valid == 'false' && inputs.lookup-only == 'false'
      run: |
        docker context create builder_context
      shell: bash --noprofile --norc -euo pipefail {0}

    - name: Set up buildx runner
      if: steps.check-cache.outputs.valid == 'false' && inputs.lookup-only == 'false'
      uses: docker/setup-buildx-action@v3
      with:
        endpoint: builder_context
        driver-opts: network=host

    - name: Build 3.11 wheel
      if: steps.check-cache.outputs.valid == 'false' && inputs.lookup-only == 'false'
      uses: docker/build-push-action@v5
      with:
        context: cudaq
        file: ./cudaq/docker/release/cudaq.wheel.Dockerfile
        build-args: |
          base_image=ghcr.io/nvidia/cuda-quantum-devdeps:manylinux-${{ inputs.platform }}-cu${{ inputs.cuda_version }}-gcc12-main
          release_version=0.14.99
          python_version=3.11
        outputs: /cudaq-wheels

    - name: Build 3.12 wheel
      if: steps.check-cache.outputs.valid == 'false' && inputs.lookup-only == 'false'
      uses: docker/build-push-action@v5
      with:
        context: cudaq
        file: ./cudaq/docker/release/cudaq.wheel.Dockerfile
        build-args: |
          base_image=ghcr.io/nvidia/cuda-quantum-devdeps:manylinux-${{ inputs.platform }}-cu${{ inputs.cuda_version }}-gcc12-main
          release_version=0.14.99
          python_version=3.12
        outputs: /cudaq-wheels

    - name: Build 3.13 wheel
      if: steps.check-cache.outputs.valid == 'false' && inputs.lookup-only == 'false'
      uses: docker/build-push-action@v5
      with:
        context: cudaq
        file: ./cudaq/docker/release/cudaq.wheel.Dockerfile
        build-args: |
          base_image=ghcr.io/nvidia/cuda-quantum-devdeps:manylinux-${{ inputs.platform }}-cu${{ inputs.cuda_version }}-gcc12-main
          release_version=0.14.99
          python_version=3.13
        outputs: /cudaq-wheels

    # ==========================================================================
    # Store CUDAQ wheels cache
    # ==========================================================================
 
    - name: Store CUDAQ wheels in the cache
      if: steps.check-cache.outputs.valid == 'false' && inputs.save-build == 'true' && inputs.lookup-only == 'false'
      uses: actions/cache/save@v4
      with:
        path: /cudaq-wheels
        key: ${{ steps.cudaq-wheels-key.outputs.main }}${{ steps.cudaq-wheels-key.outputs.suffix }}
